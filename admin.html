<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badsha AutoBet - Admin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #00FF41;
      margin: 0;
      padding: 24px;
      min-height: 100vh;
    }
    h1 { margin-top: 0; }
    .card {
      background: #161b22;
      border: 1px solid #00FF41;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      max-width: 600px;
    }
    button {
      background: #00FF41;
      color: #0a0a0a;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { opacity: 0.9; }
    input, pre {
      background: #0d1117;
      border: 1px solid #00FF41;
      color: #00FF41;
      padding: 10px 12px;
      border-radius: 8px;
      font-family: monospace;
      width: 100%;
    }
    pre { white-space: pre-wrap; word-break: break-all; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    th { color: #7FD957; }
    label { display: block; color: #00FF41; margin-bottom: 4px; }
    .msg { margin-top: 12px; color: #7FD957; }
    .copy { margin-left: 8px; padding: 4px 8px; font-size: 12px; }
    .delete-btn { background: #ff6b6b; color: #fff; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .delete-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>Badsha AutoBet Admin</h1>
  <p style="color: #7FD957;">Enter UID (number). Key is generated and linked to that UID.</p>

  <div class="card">
    <h2>Generate Key</h2>
    <label>Enter UID (number)</label>
    <input type="text" id="uidInput" placeholder="e.g. 9876543210" inputmode="numeric" style="margin: 8px 0 16px 0;" />
    <label>Expiry Date</label>
    <input type="date" id="expiryDate" style="margin: 8px 0 16px 0;" />
    <label>Expiry Time</label>
    <input type="time" id="expiryTime" style="margin: 8px 0 16px 0;" />
    <p id="expiryPreview" style="color: #7FD957; font-size: 12px; margin-top: 4px;"></p>
    <button type="button" id="btnGenerate">Generate Key</button>
    <div id="result" class="msg"></div>
    <div id="generated" style="margin-top: 12px;"></div>
  </div>

  <div class="card">
    <h2>All Keys</h2>
    <button id="btnRefresh">Refresh</button>
    <table id="keysTable">
      <thead>
        <tr><th>UID</th><th>Key</th><th>Expiry</th><th>Created</th><th></th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const base = window.location.origin;

    function setDefaultExpiry() {
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const dateEl = document.getElementById('expiryDate');
      const timeEl = document.getElementById('expiryTime');
      if (!dateEl.value) dateEl.value = tomorrow.toISOString().slice(0, 10);
      if (!timeEl.value) timeEl.value = now.toTimeString().slice(0, 5);
      updateExpiryPreview();
    }
    function updateExpiryPreview() {
      const d = document.getElementById('expiryDate').value;
      const t = document.getElementById('expiryTime').value;
      const preview = document.getElementById('expiryPreview');
      if (d && t) {
        try {
          const tPart = t.length <= 5 ? t + ':00' : t;
          const dt = new Date(d + 'T' + tPart);
          preview.textContent = isNaN(dt.getTime()) ? 'Pick date and time' : 'Will expire: ' + dt.toLocaleString();
        } catch (e) {
          preview.textContent = 'Pick date and time';
        }
      } else {
        preview.textContent = 'Pick date and time';
      }
    }

    function init() {
      setDefaultExpiry();
      document.getElementById('expiryDate').addEventListener('change', updateExpiryPreview);
      document.getElementById('expiryTime').addEventListener('input', updateExpiryPreview);
      document.getElementById('expiryTime').addEventListener('change', updateExpiryPreview);
      document.getElementById('expiryDate').addEventListener('input', updateExpiryPreview);
    }
    init();

    async function generate() {
      const resultEl = document.getElementById('result');
      try {
        const uid = document.getElementById('uidInput').value.trim();
        if (!uid) {
          resultEl.textContent = 'Enter UID first.';
          resultEl.style.color = '#ff6b6b';
          return;
        }
        const dateVal = document.getElementById('expiryDate').value;
        let timeVal = document.getElementById('expiryTime').value;
        if (!dateVal || !timeVal) {
          resultEl.textContent = 'Select expiry date and time.';
          resultEl.style.color = '#ff6b6b';
          return;
        }
        if (timeVal.length <= 5) timeVal += ':00';
        const expiry = new Date(dateVal + 'T' + timeVal).toISOString();
        const res = await fetch(base + '/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid, expiry })
        });
        const data = await res.json();
        if (!res.ok) {
          resultEl.textContent = data.error || 'Error';
          resultEl.style.color = '#ff6b6b';
          return;
        }
        const key = data.key;
        const savedExpiry = data.expiry;
        resultEl.textContent = 'Key generated successfully.';
        resultEl.style.color = '#7FD957';
        document.getElementById('generated').innerHTML = `
          <strong>UID:</strong> <pre>${uid}</pre>
          <strong>Key:</strong> <pre>${key}</pre>
          <strong>Expiry:</strong> <pre>${savedExpiry ? new Date(savedExpiry).toLocaleString() : '-'}</pre>
          <button class="copy" onclick="navigator.clipboard.writeText('${key}')">Copy Key</button>
        `;
        loadKeys();
      } catch (err) {
        resultEl.textContent = 'Error: ' + (err.message || 'Failed to generate');
        resultEl.style.color = '#ff6b6b';
      }
    }

    async function loadKeys() {
      const res = await fetch(base + '/api/keys');
      const keys = await res.json();
      const tbody = document.querySelector('#keysTable tbody');
      tbody.innerHTML = keys.map(k => `
        <tr>
          <td><code>${k.uid}</code></td>
          <td><code>${k.key}</code></td>
          <td>${k.expiry ? new Date(k.expiry).toLocaleString() : '-'}</td>
          <td>${new Date(k.createdAt).toLocaleString()}</td>
          <td><button class="delete-btn" onclick="deleteKey('${k.uid}')">Delete</button></td>
        </tr>
      `).join('') || '<tr><td colspan="5">No keys yet.</td></tr>';
    }

    async function deleteKey(uid) {
      if (!confirm('Delete key for UID ' + uid + '?')) return;
      const res = await fetch(base + '/api/delete?uid=' + encodeURIComponent(uid), { method: 'DELETE' });
      if (res.ok) {
        document.getElementById('result').textContent = 'Key deleted.';
        document.getElementById('result').style.color = '#7FD957';
        loadKeys();
      } else {
        const data = await res.json();
        document.getElementById('result').textContent = data.error || 'Delete failed';
        document.getElementById('result').style.color = '#ff6b6b';
      }
    }

    document.getElementById('btnGenerate').onclick = generate;
    document.getElementById('btnRefresh').onclick = loadKeys;
    loadKeys();
  </script>
</body>
</html>
